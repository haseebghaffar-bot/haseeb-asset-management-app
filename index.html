<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Enterprise Asset Management Application — manage, track, and organize your organizational assets with ease."
    />
    <meta name="theme-color" content="#0066cc" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <title>Asset Management — Hera</title>
  </head>
  <body>
    <div id="app">
      <style>
        .initial-loader-wrapper {
          position: fixed;
          top: 0;
          left: 0;
          width: 100vw;
          height: 100vh;
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          background-color: #ffffff;
          z-index: 9999;
          font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }
        .initial-spinner {
          width: 48px;
          height: 48px;
          border: 3px solid #f3f4f6;
          border-radius: 50%;
          border-top-color: #3b82f6;
          animation: spin 0.8s cubic-bezier(0.4, 0, 0.2, 1) infinite;
        }
        .loader-text {
          margin-top: 16px;
          font-size: 14px;
          font-weight: 500;
          color: #6b7280;
          letter-spacing: 0.025em;
        }
        @media (prefers-color-scheme: dark) {
          .initial-loader-wrapper {
            background-color: #000000;
          }
          .initial-spinner {
            border: 3px solid #111827;
            border-top-color: #3b82f6;
          }
          .loader-text {
            color: #9ca3af;
          }
        }
        @keyframes spin {
          to { transform: rotate(360deg); }
        }
      </style>
      <div class="initial-loader-wrapper">
        <div class="initial-spinner"></div>
        <div class="loader-text">Loading Hera...</div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
